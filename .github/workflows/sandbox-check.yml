name: Sandbox Check
on: [push, pull_request]

# Lightweight checks that don't need the VCV Rack SDK. Should run in well
# under a minute. The full build still runs in build.yml.

jobs:
  sandbox-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Run sandbox checks
        run: scripts/sandbox-check.sh
