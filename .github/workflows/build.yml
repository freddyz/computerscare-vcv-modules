name: Build
# Runs on every push and pull request.
# On non-tag pushes: builds all platforms and uploads artifacts with a git sha version stamp.
#
# TO MAKE A RELEASE:
#   1. Update "version" in plugin.json (e.g. "2.1.12")
#   2. Commit and push
#   3. Tag the commit: git tag v2.1.12 && git push origin v2.1.12
#   A GitHub Release will be created automatically with all platform .vcvplugin files attached.
#   The tag name must match the version in plugin.json (e.g. tag v2.1.12 <-> version "2.1.12").
on:
  push:
  pull_request:

env:
  # Rack SDK version to build against. Update this when a new SDK is released.
  rack-sdk-version: 2.6.6

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: lin-x64, os: ubuntu-latest }
          - { name: win-x64, os: windows-latest }
          - { name: mac-x64, os: macos-latest, arch: x64 }
          - { name: mac-arm64, os: macos-latest, arch: arm64 }
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Append git sha to version
        if: "! startsWith(github.ref, 'refs/tags/v')"
        run: |
          gitrev=`git rev-parse --short HEAD`
          pluginversion=`jq -r '.version' plugin.json`
          cat <<< `jq --arg VERSION "$pluginversion-$gitrev" '.version=$VERSION' plugin.json` > plugin.json

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglu-dev

      - name: Get Linux SDK
        if: runner.os == 'Linux'
        run: |
          pushd $HOME
          curl -Lo Rack-SDK.zip https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-lin-x64.zip
          unzip Rack-SDK.zip

      - name: Get Windows SDK
        if: runner.os == 'Windows'
        run: |
          pushd $HOME
          curl -Lo Rack-SDK.zip https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-win-x64.zip
          unzip Rack-SDK.zip
          sed -i 's/zip -q -9 -r/7z a -tzip -mx=9/' $HOME/Rack-SDK/plugin.mk

      - name: Get Mac SDK
        if: runner.os == 'macOS'
        run: |
          pushd $HOME
          curl -Lo Rack-SDK.zip https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-mac-${{ matrix.config.arch }}.zip
          unzip Rack-SDK.zip

      - name: Build plugin
        run: |
          CROSS_COMPILE_TARGET_x64=x86_64-apple-darwin
          CROSS_COMPILE_TARGET_arm64=arm64-apple-darwin
          export RACK_DIR=$HOME/Rack-SDK
          export CROSS_COMPILE=$CROSS_COMPILE_TARGET_${{ matrix.config.arch }}
          make -j dep
          make -j dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.vcvplugin
          name: ${{ matrix.config.name }}

  mac-universal:
    name: mac-universal
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download mac-x64
        uses: actions/download-artifact@v8
        with:
          name: mac-x64
          path: mac-x64

      - name: Download mac-arm64
        uses: actions/download-artifact@v8
        with:
          name: mac-arm64
          path: mac-arm64

      - name: Create universal plugin
        run: |
          mkdir x64-unpacked arm64-unpacked
          X64_PLUGIN=$(ls mac-x64/*.vcvplugin)
          ARM64_PLUGIN=$(ls mac-arm64/*.vcvplugin)
          zstd -d "$X64_PLUGIN" -o x64.tar
          zstd -d "$ARM64_PLUGIN" -o arm64.tar
          tar -xf x64.tar -C x64-unpacked
          tar -xf arm64.tar -C arm64-unpacked
          PLUGIN_DIR=$(tar -tf x64.tar | head -1 | cut -d/ -f1)
          lipo -create \
            -output "x64-unpacked/$PLUGIN_DIR/plugin.dylib" \
            "x64-unpacked/$PLUGIN_DIR/plugin.dylib" \
            "arm64-unpacked/$PLUGIN_DIR/plugin.dylib"
          lipo -info "x64-unpacked/$PLUGIN_DIR/plugin.dylib"
          OUTNAME=$(basename "$X64_PLUGIN" | sed 's/-mac-x64/-mac-universal/')
          tar -cf universal.tar -C x64-unpacked .
          zstd -19 universal.tar -o "$OUTNAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: "*.vcvplugin"
          name: mac-universal

  # Only runs when a v* tag is pushed. Verifies plugin.json version matches the tag,
  # then creates a GitHub Release with lin, win, and mac-universal .vcvplugin files.
  publish:
    name: Publish
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, mac-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check plugin version matches tag
        run: |
          pluginversion=`jq -r '.version' plugin.json`
          if [ "v$pluginversion" != "${{ github.ref_name }}" ]; then
            echo "Plugin version 'v$pluginversion' doesn't match tag '${{ github.ref_name }}'"
            exit 1
          fi

      - uses: actions/download-artifact@v8
        with:
          name: lin-x64
          path: _artifacts

      - uses: actions/download-artifact@v8
        with:
          name: win-x64
          path: _artifacts

      - uses: actions/download-artifact@v8
        with:
          name: mac-universal
          path: _artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          name: Computerscare Modules ${{ github.ref_name }}
          body: |
            ${{ github.event.repository.name }} VCV Rack Plugin ${{ github.ref_name }}
            Built against Rack SDK ${{ env.rack-sdk-version }}
          draft: false
          prerelease: false
          files: _artifacts/*.vcvplugin
