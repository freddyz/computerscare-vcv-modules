name: Build v2
on: [workflow_dispatch]

env:
  rack-sdk-version: 2.6.6

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      matrix:
        config:
          - {
              name: Linux,
              os: ubuntu-latest,
              prepare-os: sudo apt-get update;sudo apt-get install -y libglu-dev;,
            }
          - { name: MacOS, os: macos-13, prepare-os: "", sdk: x64 }
          - { name: MacOS-arm, os: macos-14, prepare-os: "", sdk: arm64 }
          - { name: Windows, os: windows-latest, prepare-os: export CC=gcc }
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Add SHORT_SHA env property with commit short sha
        run: echo "SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-8`" >> $GITHUB_ENV

      - name: Patch plugin.mk, use 7zip on Windows
        if: runner.os == 'Windows'
        run: |
          pushd $HOME
          curl -o Rack-SDK.zip https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-win-x64.zip
          unzip Rack-SDK.zip
          sed -i 's/zip -q -9 -r/7z a -tzip -mx=9/' $HOME/Rack-SDK/plugin.mk

      - name: Get Mac SDK
        if: runner.os == 'MacOS'
        run: |
          pushd $HOME
          curl -o Rack-SDK.zip https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-mac-${{ matrix.config.sdk }}.zip
          unzip Rack-SDK.zip

      - name: Get Linux SDK
        if: runner.os == 'Linux'
        run: |
          pushd $HOME
          curl -o Rack-SDK.zip https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-lin-x64.zip
          unzip Rack-SDK.zip

      - name: Modify plugin version
        # only modify plugin version if no tag was created
        if: "! startsWith(github.ref, 'refs/tags/v')"
        run: |
          gitrev=`git rev-parse --short HEAD`
          pluginversion=`jq -r '.version' plugin.json`
          echo "Set plugin version from $pluginversion to $pluginversion-$gitrev"
          cat <<< `jq --arg VERSION "$pluginversion-$gitrev" '.version=$VERSION' plugin.json` > plugin.json

      - name: Build plugin
        run: |
          ${{ matrix.config.prepare-os }}
          export RACK_DIR=$HOME/Rack-SDK
          make -j dep
          make -j dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist
          name: computerscare-modules-2.git.${{ github.sha }}-${{ matrix.config.name }}

  publish:
    name: Publish plugin
    # only create a release if a tag was created that is called e.g. v1.2.3
    # see also https://vcvrack.com/manual/Manifest#version
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Check if plugin version matches tag
        run: |
          pluginversion=`jq -r '.version' plugin.json`
          if [ "v$pluginversion" != "${{ github.ref_name }}" ]; then
            echo "Plugin version from plugin.json 'v$pluginversion' doesn't match with tag version '${{ github.ref_name }}'"
            exit 1
          fi
      - uses: actions/download-artifact@v8
        with:
          path: _artifacts
      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: Computerscare Modules ${{ github.ref_name }}
          body: |
            ${{ github.event.repository.name }} VCV Rack Plugin ${{ github.ref_name }}
            Built against Rack SDK version: ${{ env.rack-sdk-version }}
          draft: false
          prerelease: false
          files: _artifacts/**/*.vcvplugin
